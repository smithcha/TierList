<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winter 2026 Course Tier List</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111114;
    --surface: #1a1a1f;
    --surface2: #25252c;
    --border: rgba(255,255,255,0.08);
    --text: #ececec;
    --muted: #777;
    --s: #ff5757;
    --s-bg: rgba(255,87,87,0.15);
    --a: #ff9500;
    --a-bg: rgba(255,149,0,0.15);
    --b: #ffd60a;
    --b-bg: rgba(255,214,10,0.14);
    --c: #34c6ff;
    --c-bg: rgba(52,198,255,0.13);
    --d: #8e8ea0;
    --d-bg: rgba(142,142,160,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    padding: 48px 20px 72px;
    line-height: 1.6;
  }

  header {
    text-align: center;
    margin-bottom: 52px;
  }

  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  header h1 {
    font-size: clamp(30px, 5vw, 54px);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.15;
  }

  header h1 span {
    color: var(--s);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  /* Unranked pool */
  .pool-section {
    margin-bottom: 32px;
  }

  .pool-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .pool {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    min-height: 70px;
    padding: 14px;
    background: var(--surface);
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 12px;
    transition: background 0.15s, border-color 0.15s;
    align-items: center;
  }

  .pool.drag-over {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.22);
  }

  /* Tier rows */
  .tiers { display: flex; flex-direction: column; gap: 5px; }

  .tier-row {
    display: flex;
    align-items: stretch;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .tier-badge {
    width: 64px;
    min-width: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    flex-shrink: 0;
  }

  .tier-badge.S { background: var(--s-bg); color: var(--s); }
  .tier-badge.A { background: var(--a-bg); color: var(--a); }
  .tier-badge.B { background: var(--b-bg); color: var(--b); }
  .tier-badge.C { background: var(--c-bg); color: var(--c); }
  .tier-badge.D { background: var(--d-bg); color: var(--d); }

  .tier-drop {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 14px;
    min-height: 68px;
    background: var(--surface);
    align-items: center;
    transition: background 0.15s;
  }

  .tier-drop.drag-over {
    background: var(--surface2);
  }

  /* Course cards */
  .card {
    cursor: grab;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 9px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    user-select: none;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.1s;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    border-color: rgba(255,255,255,0.16);
  }

  .card:active { cursor: grabbing; }

  .card.dragging { opacity: 0.3; transform: scale(0.96); }

  .card-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    line-height: 1.4;
  }

  .card-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    line-height: 1.4;
  }

  /* Bottom controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  button {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 22px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    border: 1px solid var(--border);
    line-height: 1.5;
  }

  button:active { transform: scale(0.97); }

  .btn-reset {
    background: transparent;
    color: var(--muted);
  }

  .btn-reset:hover { background: var(--surface); color: var(--text); }

  .btn-copy {
    background: var(--surface2);
    color: var(--text);
    border-color: rgba(255,255,255,0.13);
  }

  .btn-copy:hover { background: #2c2c35; }

  .btn-share {
    background: var(--s-bg);
    color: var(--s);
    border-color: rgba(255,87,87,0.25);
  }

  .btn-share:hover { background: rgba(255,87,87,0.25); }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 9px 22px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    line-height: 1.5;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Winter 2026 &mdash; Law &amp; Policy</div>
  <h1>Course <span>Tier</span> List</h1>
  <div class="subtitle">drag &amp; drop to rank your classes</div>
</header>

<div class="container">

  <div class="pool-section">
    <div class="pool-label">Unranked</div>
    <div class="pool" id="pool" ondragover="onOver(event)" ondrop="onDrop(event,'pool')" ondragleave="onLeave(event)"></div>
  </div>

  <div class="tiers" id="tiers"></div>

  <div class="controls">
    <button class="btn-reset" onclick="reset()">Reset</button>
    <button class="btn-copy" onclick="copyResult()">Copy results</button>
    <button class="btn-share" onclick="shareAsPng()">Share as image</button>
  </div>

</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
const courses = [
  { id: 'law527', code: 'LAW A 527', title: 'Environmental Law' },
  { id: 'law540', code: 'LAW A 540', title: 'Land Use Plan Sem' },
  { id: 'law563', code: 'LAW A 563', title: 'Local Gvt Law' },
  { id: 'lawe598', code: 'LAW E 598', title: 'Climate Change Law' },
  { id: 'pubpol594', code: 'PUBPOL 594', title: 'Econ Environ Mgmt' },
  { id: 'law551', code: 'LAW A 551', title: 'Tree Law' },
  { id: 'drede587', code: 'DRED E 587', title: 'I Am The Law' },
];

const tiers = ['S','A','B','C','D'];
let dragging = null;

function makeCard(course) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = course.id;
  el.innerHTML = `<span class="card-code">${course.code}</span><span class="card-title">${course.title}</span>`;
  el.addEventListener('dragstart', e => {
    dragging = el;
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragging = null;
  });
  return el;
}

function onOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, zone) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragging) e.currentTarget.appendChild(dragging);
}

function buildTiers() {
  const container = document.getElementById('tiers');
  container.innerHTML = '';
  tiers.forEach(t => {
    const row = document.createElement('div');
    row.className = 'tier-row';

    const badge = document.createElement('div');
    badge.className = `tier-badge ${t}`;
    badge.textContent = t;

    const drop = document.createElement('div');
    drop.className = 'tier-drop';
    drop.id = 'tier-' + t;
    drop.addEventListener('dragover', onOver);
    drop.addEventListener('dragleave', onLeave);
    drop.addEventListener('drop', e => onDrop(e, t));

    row.appendChild(badge);
    row.appendChild(drop);
    container.appendChild(row);
  });
}

function reset() {
  buildTiers();
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  courses.forEach(c => pool.appendChild(makeCard(c)));
}

function copyResult() {
  let text = 'Winter 2026 Course Tier List\n\n';
  tiers.forEach(t => {
    const drop = document.getElementById('tier-' + t);
    const cards = [...drop.querySelectorAll('.card')].map(c => c.querySelector('.card-title').textContent);
    if (cards.length) text += `${t}: ${cards.join(', ')}\n`;
  });
  const pool = document.getElementById('pool');
  const unranked = [...pool.querySelectorAll('.card')].map(c => c.querySelector('.card-title').textContent);
  if (unranked.length) text += `Unranked: ${unranked.join(', ')}\n`;

  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
}

async function shareAsPng() {
  const container = document.querySelector('.container');
  const canvas = await html2canvas(container, {
    backgroundColor: '#111114',
    scale: 2,
  });
  canvas.toBlob(async blob => {
    try {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      showToast('Image copied to clipboard!');
    } catch {
      // Fallback: download the image
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tier-list.png';
      a.click();
      showToast('Image downloaded!');
    }
  }, 'image/png');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

reset();
</script>
</body>
</html>
